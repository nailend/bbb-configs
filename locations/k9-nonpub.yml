ipv6_prefix: '2001:bf7:830:8d00::/56'

# K9 Prefixes:
# 10.31.9.0/24

# - 10.31.9.0/25 - DHCP
# - 10.31.9.224/28 - BBB-Mesh
# - 10.31.9.240/28 - MGMT

networks:

  # DHCP
  - vid: 40
    role: dhcp
    inbound_filtering: true
    enforce_client_isolation: true
    prefix: 10.31.9.0/25
    ipv6_subprefix: 0
    assignments:
      k9-core: 1

  - vid: 1
    name: k9_dhcp
    role: ext
    prefix: 172.17.9.0/24
    gateway: 1
    broadcast: 172.17.9.255
    dns:
      - '172.16.9.5'
      - '172.16.9.126'
    no_corerouter_dns_record: true
    enforce_client_isolation: false
    # inbound_filtering: true
    untagged: true
    assignments:
      # k9ap-12: 12 # Anna-lea
